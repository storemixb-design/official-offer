<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador Presell Gringa Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">Gringa Presell Generator 🚀</h1>
        
        <div class="space-y-4">
            <input id="imgUrl" type="text" placeholder="Product Image URL" class="w-full p-3 rounded bg-slate-700 border-none">
            <input id="afLink" type="text" placeholder="Affiliate Link (Kiwify/Digistore/Clickbank)" class="w-full p-3 rounded bg-slate-700 border-none">
            <input id="titulo" type="text" placeholder="Product Name / Title" class="w-full p-3 rounded bg-slate-700 border-none">
            
            <div class="grid grid-cols-2 gap-4">
                <input id="q1" type="text" placeholder="FAQ Question 1 (Ex: Is it safe?)" class="p-3 rounded bg-slate-700 border-none text-sm">
                <input id="a1" type="text" placeholder="FAQ Answer 1" class="p-3 rounded bg-slate-700 border-none text-sm">
            </div>

            <button onclick="gerarCodigo()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl transition shadow-lg">GENERATE PRO CODE</button>
        </div>
        
        <textarea id="resultado" class="w-full h-48 mt-6 p-4 rounded bg-black text-green-400 text-xs font-mono" readonly placeholder="Your professional code will appear here..."></textarea>
    </div>

    <script>
        function gerarCodigo() {
            const img = document.getElementById('imgUrl').value;
            const link = document.getElementById('afLink').value;
            const titulo = document.getElementById('titulo').value;
            const q1 = document.getElementById('q1').value || "Is this product official?";
            const a1 = document.getElementById('a1').value || "Yes, you will be redirected to the official website.";
            
            const html = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${titulo} - Official Site</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="max-w-lg mx-auto py-12 px-6">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden text-center p-8 border border-gray-100">
            <img src="${img}" class="w-64 mx-auto mb-6 rounded-lg shadow-md">
            <h1 class="text-3xl font-extrabold mb-4 leading-tight">${titulo}</h1>
            <p class="text-gray-500 mb-8 font-medium">Verify availability and secure your order on the official page below.</p>
            
            <a href="${link}" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl text-xl shadow-lg transition transform hover:scale-105">
                CHECK AVAILABILITY →
            </a>
        </div>

        <div class="mt-10 space-y-4">
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <h3 class="font-bold text-gray-800">Q: ${q1}</h3>
                <p class="text-gray-600 text-sm mt-1">A: ${a1}</p>
            </div>
        </div>

        <footer class="mt-12 text-center text-[10px] text-gray-400">
            <p class="mb-4 text-gray-500">Copyright © 2026 - All Rights Reserved.</p>
            <div class="flex justify-center space-x-3 underline decoration-gray-300">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Use</a>
                <a href="#">Contact Us</a>
            </div>
            <p class="mt-6 leading-relaxed italic">This site is not part of the Google website or Google Inc. Additionally, This site is NOT endorsed by Google in any way. GOOGLE is a trademark of GOOGLE, Inc.</p>
        </footer>
    </div>
</body>
</html>`;
            document.getElementById('resultado').value = html;
        }
    </script>
</body>
</html>
